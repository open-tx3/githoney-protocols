[protocol]
name = "githoney-badges"
scope = "open-tx3"
version = "0.1.0"
description = "CIP-68 contributor and maintainer badges for GitHoney on Cardano: mint, update metadata, transfer, and reclaim"
main = "main.tx3"
readme = "README.md"
logo = "logo.png"
repository = "https://github.com/open-tx3/githoney-protocols"

[ledger]
family = "cardano"

# Per-network profiles. Each loads `.env.<profile>` to populate main.tx3's
# `env { ... }` block (settings_ref plus the badge validator/minting scripts and
# policy id). Only `preprod` is configured, from the live GitHoney deployment;
# add a profile per network as new environments are deployed.

[profile.preprod]
env_file = ".env.preprod"

[protocol]
name = "githoney-badges"
scope = "open-tx3"
version = "0.1.0"
description = "CIP-68 contributor and maintainer badges for GitHoney on Cardano: mint, update metadata, transfer, and reclaim"
main = "main.tx3"
readme = "README.md"
logo = "logo.png"
repository = "https://github.com/open-tx3/githoney-protocols"

[ledger]
family = "cardano"

# Per-network profiles. Each loads `.env.<profile>` to populate the
# network-level `env { ... }` block in main.tx3 (the badge validator and
# minting scripts plus the published GitHoney settings UTxO that badge spends
# reference). The values come from a deployed GitHoney `config.json`; the
# committed files hold placeholders — replace them before invoking against a
# real network.

[profile.local]
env_file = ".env.local"

[profile.preview]
env_file = ".env.preview"

[profile.preprod]
env_file = ".env.preprod"

[profile.mainnet]
env_file = ".env.mainnet"

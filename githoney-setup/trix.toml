[protocol]
name = "githoney-setup"
scope = "open-tx3"
version = "0.1.0"
description = "Deploy and manage a GitHoney environment on Cardano: publish the settings UTxO and validator reference script, update the fee schedule, and tear it down"
main = "main.tx3"
readme = "README.md"
logo = "logo.png"
repository = "https://github.com/open-tx3/githoney-protocols"

[ledger]
family = "cardano"

# Per-network profiles. Each loads `.env.<profile>` to populate main.tx3's
# `env { ... }` block — the compiled GitHoney contract suite for that network.
# Only `preprod` is configured, from the live GitHoney deployment; add a profile
# per network as new contract suites are deployed.

[profile.preprod]
env_file = ".env.preprod"

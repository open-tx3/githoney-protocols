[protocol]
name = "githoney-bounties"
scope = "open-tx3"
version = "0.1.0"
description = "Escrow-based bounties on Cardano for open-source contributions: fund, assign, merge, and claim"
main = "main.tx3"
readme = "README.md"
logo = "logo.png"
repository = "https://github.com/open-tx3/githoney-protocols"

[ledger]
family = "cardano"

# Per-network profiles. Each loads `.env.<profile>` to populate the operating
# environment in main.tx3's `env { ... }` block (settings_ref, admin credential,
# bounty policy id). Only `preprod` is configured, from the live GitHoney
# deployment; add a profile per network as new environments are deployed.

[profile.preprod]
env_file = ".env.preprod"
